name: Release IPTV

on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write
  deployments: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SSH_PORT: ${{ secrets.SSH_PORT || '22' }}

jobs:
  quality:
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  test:
    needs: quality
    uses: ./.github/workflows/tests.yml
    secrets: inherit

  build:
    name: Build APP
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          extensions: bcmath, curl, dom, fileinfo, gd, intl, mbstring, pdo, pdo_mysql, pdo_pgsql, pdo_sqlite, sqlite, xml, zip

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Generate production environment
        run: |
          cat > .env <<'ENV'
          APP_NAME="IPTV CMS"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}

          LOG_CHANNEL=stack
          LOG_DEPRECATIONS_CHANNEL=null
          LOG_LEVEL=error

          DB_CONNECTION=pgsql
          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_DATABASE="${{ secrets.DB_DATABASE }}"
          DB_USERNAME="${{ secrets.DB_USERNAME }}"
          DB_PASSWORD="${{ secrets.DB_PASSWORD }}"

          BROADCAST_DRIVER=log
          CACHE_DRIVER=file
          FILESYSTEM_DRIVER=local
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=file
          SESSION_LIFETIME=120

          MEMCACHED_HOST=127.0.0.1

          REDIS_HOST=127.0.0.1
          REDIS_PASSWORD=null
          REDIS_PORT=6379

          MAIL_MAILER=smtp
          MAIL_HOST=mailhog
          MAIL_PORT=1025
          MAIL_USERNAME=null
          MAIL_PASSWORD=null
          MAIL_ENCRYPTION=null
          MAIL_FROM_ADDRESS=null
          MAIL_FROM_NAME="IPTV CMS"

          AWS_ACCESS_KEY_ID=
          AWS_SECRET_ACCESS_KEY=
          AWS_DEFAULT_REGION=us-east-1
          AWS_BUCKET=
          AWS_USE_PATH_STYLE_ENDPOINT=false

          PUSHER_APP_ID=
          PUSHER_APP_KEY=
          PUSHER_APP_SECRET=
          PUSHER_APP_CLUSTER=mt1

          MIX_PUSHER_APP_KEY="${PUSHER_APP_KEY}"
          MIX_PUSHER_APP_CLUSTER="${PUSHER_APP_CLUSTER}"
          ENV

      - name: Install Composer dependencies
        run: composer install --no-ansi --no-dev --no-interaction --no-progress --optimize-autoloader --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Remove development files
        run: |
          rm -rf node_modules
          rm -rf .git

      - name: Archive build artifacts
        run: tar -cvf ${{ github.event.repository.name }}.tar ./
        shell: bash

      - name: Release build artifact
        uses: actions/upload-artifact@v5
        with:
          name: app-build
          path: ${{ github.event.repository.name }}.tar
          retention-days: 3

  deploy_web:
    name: Deploy Web
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v6
        with:
          name: app-build

      - name: Write SSH keys
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H -p "${{ env.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy artifact with rsync
        run: rsync -rav --delete -e "ssh -p ${{ env.SSH_PORT }}" ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/${{ github.event.repository.name }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          script: |
            WORK_DIR="${{ secrets.WORK_DIR }}"
            RELEASE_DIR="/tmp/${{ github.event.repository.name }}"
            EXTRACT_DIR="/tmp/${{ github.event.repository.name }}-extracted"

            rm -rf "$EXTRACT_DIR"
            mkdir -p "$EXTRACT_DIR"
            tar -xvf "$RELEASE_DIR/${{ github.event.repository.name }}.tar" -C "$EXTRACT_DIR"

            rm -rf "$WORK_DIR"/*
            cp -TRv "$EXTRACT_DIR/" "$WORK_DIR/"
            sudo chmod 777 -R "$WORK_DIR"
            sudo chown www-data:www-data -R "$WORK_DIR"

            cd "$WORK_DIR"

            php artisan migrate --force
            php artisan storage:link || true
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan optimize
            php artisan up

            rm -rf "$RELEASE_DIR" "$EXTRACT_DIR"

  create_release:
    name: Create GitHub Release
    needs: deploy_web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          VERSION="$(date +'%Y.%m.%d')+${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: Automated release for version ${{ steps.version.outputs.version }}.
